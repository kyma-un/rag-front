<div class="h-full flex flex-col bg-primary">
  <div class="flex-1 overflow-y-auto p-4 space-y-3">
    @for (msg of messages; track $index) {
      @if (msg.role === 'user') {
        <div class="ml-auto max-w-3xl rounded-lg px-3 py-2 bg-accent text-white">
          {{ msg.text }}
        </div>
      } @else {
        <div class="max-w-3xl rounded-lg px-3 py-2 bg-sidebar text-slate-100 border border-slate-700">
          {{ msg.text }}
        </div>
      }
    }

    @if (isLoading) {
      <div class="max-w-3xl rounded-lg px-3 py-2 bg-sidebar text-slate-300 border border-slate-700">
        Pensando...
      </div>
    }
  </div>

  <div class="border-t border-slate-700 bg-navbar/70 p-4">
    <div class="flex gap-2">
      <input
        [(ngModel)]="inputText"
        (keydown.enter)="sendMessage()"
        placeholder="Escribe tu pregunta"
        class="flex-1 rounded-md bg-sidebar border border-slate-600 text-slate-100 placeholder-slate-400 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent"
      />

      <button
        (click)="sendMessage()"
        [disabled]="isLoading || !inputText.trim()"
        class="rounded-md bg-accent text-white px-4 py-2 font-medium hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Enviar
      </button>
    </div>
  </div>
</div>
